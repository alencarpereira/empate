<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Favorito + Empate (Meta de Lucro)</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Calculadora de Lucro Alvo</h1>
        <p style="text-align: center; color: #666; margin-top: -15px; font-size: 0.9rem;">Favorito Ganha ou Empate
            Devolve</p>

        <div class="form-group">
            <label>Quanto você quer ganhar (Lucro Limpo):</label>
            <input type="number" id="metaLucro" value="10" step="0.01">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Odd Favorito:</label>
                <input type="number" id="oddFav" value="2.10" step="0.01">
            </div>
            <div class="form-group">
                <label>Odd do Empate:</label>
                <input type="number" id="oddEmpate" value="3.40" step="0.01">
            </div>
        </div>

        <button onclick="calcularMetaDNB()" style="background-color: #27ae60;">
            Calcular Investimento Necessário
        </button>

        <div id="resultado" class="resultado-box hidden">
            <h3>Plano para lucrar R$ <span id="valMeta"></span>:</h3>
            <p id="resA"></p>
            <p id="resEmpate"></p>
            <hr>
            <div style="text-align: center;">
                <p id="resTotal" style="font-weight: bold; font-size: 1.1rem; color: #2c3e50;"></p>
                <p id="infoAdicional" style="font-size: 0.85rem; color: #34495e; margin-top: 10px;"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>

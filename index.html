<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Favorito + Empate</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Calculadora de Aposta</h1>
        <p style="text-align: center; color: #666; margin-top: -15px; font-size: 0.9rem;">Favorito com Proteção no
            Empate</p>

        <div class="form-group">
            <label>Valor Total (R$):</label>
            <input type="number" id="valorTotal" value="10" step="0.01">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Time A (Favorito):</label>
                <input type="text" id="nomeA" value="Time A">
            </div>
            <div class="form-group">
                <label>Time B (Zebra):</label>
                <input type="text" id="nomeB" value="Time B">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Odd Favorito:</label>
                <input type="number" id="oddFav" value="2.10" step="0.01">
            </div>
            <div class="form-group">
                <label>Odd Empate:</label>
                <input type="number" id="oddEmpate" value="3.40" step="0.01">
            </div>
        </div>

        <button onclick="calcularDNB()" style="background-color: #27ae60;">
            Calcular com Proteção
        </button>

        <div id="resultado" class="resultado-box hidden">
            <h3>Distribuição Sugerida:</h3>
            <p id="resA"></p>
            <p id="resEmpate"></p>
            <hr>
            <div style="text-align: center;">
                <p id="resLucro" class="lucro"></p>
                <p id="infoAdicional" style="font-size: 0.85rem; color: #34495e; margin-top: 10px;"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>

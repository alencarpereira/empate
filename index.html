<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Trading: Back & Lay</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Trade Esportivo</h1>
        <p style="text-align: center; color: #666; margin-top: -15px; font-size: 0.9rem;">Estratégia: Proteção Back/Lay
        </p>

        <div class="form-group">
            <label>Investimento Inicial (Back) R$:</label>
            <input type="number" id="valorBack" value="10" step="0.01">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Time A:</label>
                <input type="text" id="nomeA" value="Time A">
            </div>
            <div class="form-group">
                <label>Time B:</label>
                <input type="text" id="nomeB" value="Time B">
            </div>
        </div>

        <div class="row">
            <div class="form-group" style="color: #3182ce;">
                <label>Odd Entrada (Back):</label>
                <input type="number" id="oddBack" value="2.00" step="0.01">
            </div>
            <div class="form-group" style="color: #e53e3e;">
                <label>Odd Saída (Lay):</label>
                <input type="number" id="oddLay" value="1.50" step="0.01">
            </div>
        </div>

        <button onclick="calcularTrade()" style="background-color: #2c3e50;">
            Analisar Cenários
        </button>

        <div id="resultado" class="resultado-box hidden">
            <h3>Planejamento do Trade:</h3>
            <p id="resA"></p>
            <p id="resLay"></p>
            <hr>
            <div style="text-align: center;">
                <p id="resLucro" class="lucro"></p>
                <p id="infoAdicional" style="font-size: 0.85rem; color: #34495e; margin-top: 10px; line-height: 1.4;">
                </p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
